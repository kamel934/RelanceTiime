name: Build, test and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ListeTiime.slnx

      - name: Run tests
        run: dotnet test ListeTiime.slnx -c Release --no-restore

      - name: Build executable
        run: >
          dotnet publish src\ListeTiime.App\ListeTiime.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:PublishTrimmed=false
          -p:EnableCompressionInSingleFile=false
          -o publish

      - name: Verify Windows metadata
        shell: pwsh
        run: |
          $file = Get-Item -LiteralPath "publish\Liste Tiime.exe"
          $info = $file.VersionInfo
          $expected = @{
            ProductName = "Liste Tiime"
            CompanyName = "Kamel"
            FileVersion = "2.0.0.0"
            ProductVersion = "2.0.0"
            LegalCopyright = "Copyright (c) 2026 Kamel"
          }
          foreach ($entry in $expected.GetEnumerator()) {
            if ($info.($entry.Key) -ne $entry.Value) {
              throw "$($entry.Key): attendu '$($entry.Value)', obtenu '$($info.($entry.Key))'"
            }
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Liste Tiime win-x64
          path: publish/Liste Tiime.exe

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release" -Force | Out-Null
          $releasePath = "release\Liste Tiime.exe"
          Copy-Item -LiteralPath "publish\Liste Tiime.exe" -Destination $releasePath

          $hash = (Get-FileHash -LiteralPath $releasePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *Liste Tiime.exe" | Set-Content -LiteralPath "release\SHA256SUMS.txt" -Encoding ascii

          @"
          ## Liste Tiime $env:GITHUB_REF_NAME

          Statut de signature : **NON SIGNÉ**

          - Réécriture complète en C# WinForms / .NET 10
          - Détection automatique fournisseur/client
          - Exports Excel et PDF
          - Glisser-déposer direct sur l'exécutable
          - SHA-256 fourni dans `SHA256SUMS.txt`

          Consultez le README pour les instructions et la politique de confidentialité.
          "@ | Set-Content -LiteralPath "release\RELEASE_NOTES.md" -Encoding utf8

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Liste Tiime ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/Liste Tiime.exe
            release/SHA256SUMS.txt
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: true
